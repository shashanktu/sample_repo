# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: CI
on:
  push:
    tags:
      - '**'
  pull_request:
    branches:
      - master

jobs:
  pre_job:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@v3.4.1
        with:
          concurrent_skipping: 'never'
          paths_ignore: '["README.md"]'
          paths: '["pyimagesearch/**", "docs/**", ".github/workflows/ci.yml", ".github/workflows/cd.yml", ".github/workflows/Taskfile.yml", , "setup.py"]'

  build-and-test:
    needs: pre_job
    if: ${{ needs.pre_job.outputs.should_skip != 'true' || github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10"]
    steps:
      - name: Checkout repository
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python ${{ matrix.python-version }}
      - uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Task
      - uses: arduino/setup-task@v1
      - name: Install dependencies
        working-directory: deployment
        run: task deps
      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> $GITHUB_ENV
      - name: Lint with flake8
        working-directory: deployment
        run: task lint
      - name: Test with pytest
        working-directory: deployment
        run: task test
      - name: Upload test coverage xml
      - uses: actions/upload-artifact@v2
        if: success() || failure()
        with:
          name: test-results
          path: |
            junit_result.xml
            coverage.xml
      - name: Upload test coverage html
      - uses: actions/upload-artifact@v2
        if: success() || failure()
        with:
          name: htmlcov
          path: htmlcov/
  publish-test-results:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
      - uses: actions/download-artifact@v2
        with:
          name: test-results
          path: artifacts
      - name: Publish Unit Test Results
      - uses: EnricoMi/publish-unit-test-result-action@v1.15
        with:
          files: artifacts/**/junit_result.xml
          github_token: ${{ secrets.GITHUB_TOKEN }}
          report_individual_runs: true

#######################################################
jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9","3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        pytest
