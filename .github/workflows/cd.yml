# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: CI
on:
  push:
    tags:
      - '**'
  pull_request:
    branches:
      - master

jobs:
  pre_job:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@v3.4.1
        with:
          concurrent_skipping: 'never'
          paths_ignore: '["README.md"]'
          paths: '["pyimagesearch/**", "docs/**", ".github/workflows/ci.yml", ".github/workflows/cd.yml", ".github/workflows/Taskfile.yml", , "setup.py"]'
  publish-release:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
      - name: Set up Python runtime
      - uses: actions/setup-python@v2.2.1
        with:
          python-version: 3.9
      - name: Install Task
      - uses: arduino/setup-task@v1
      - name: Install dependencies
        working-directory: deployment
        run: task deps
      - name: Install Wheel
        run: python -m pip install wheel
      - name: Install Twine
        run: python -m pip install --upgrade twine
      - name: Build package 
        run: python setup.py sdist bdist_wheel
      - name: Find and Set Package File Path
        run: |
          PACKAGE_FILE=$(ls dist/*.whl)
          PACKAGE_NAME=$(basename $PACKAGE_FILE)
          echo "PACKAGE_FILE=$PACKAGE_FILE" >> $GITHUB_ENV
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV 
      - name: Create or Get Release
        id: create_release
        uses: actions/github-script@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
              const { data: releases } = await github.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo
              });
              let release = releases.find(r => r.tag_name === context.ref.replace('refs/tags/', ''));
              if (!release) {
                const response = await github.repos.createRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_name: context.ref.replace('refs/tags/', ''),
                  name: context.ref.replace('refs/tags/', ''),
                  body: 'Auto-generated release',
                  draft: false,
                  prerelease: false
                });
                release = response.data;
              }
              core.setOutput('upload_url', release.upload_url);
              core.setOutput('release_id', release.id);
      - name: Upload package to GitHub Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ env.PACKAGE_FILE }}
          asset_name: ${{ env.PACKAGE_NAME }}
          asset_content_type: application/zip
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate Changelog
          run: |
              git-chglog -o CHANGELOG.txt --template .chglog/CHANGELOG-release.tpl.md $(git describe --tags $(git rev-list --tags --max-count=1))
      - name: Update Release with Changelog 📦️
        uses: actions/github-script@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
            script: |
              const release_id = '${{ steps.create_release.outputs.release_id }}';
              const fs = require('fs');
              const changelog = fs.readFileSync('CHANGELOG.txt', 'utf8');
              await github.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release_id,
                body: changelog
              });